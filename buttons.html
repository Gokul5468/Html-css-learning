<style>
    .subscribe-button{
        background-color:rgb(245, 59, 59);
        color:white;
        border:none;
        height:35px;
        width:100px;
        border-radius:2px;
        cursor: pointer;
        margin-right:8px;
        transition: opacity 0.15s;
    }

    .subscribe-button:hover {
        opacity:0.2;
    }
    .subscribe-button:active{
       opacity: 0.4;
    }
</style>

<button class = "subscribe-button">
    Subscribe
</button>

<style>

        height :33px;
